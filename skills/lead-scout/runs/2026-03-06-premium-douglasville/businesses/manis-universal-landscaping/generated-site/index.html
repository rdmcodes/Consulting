<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mani's Universal | Elite Landscapes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030303;
            color: #ffffff;
            overflow-x: hidden;
        }

        .observer-target {
            opacity: 0.05;
            will-change: opacity, transform, filter;
        }

        .blurReveal {
            filter: blur(10px);
            transform: translateY(20px);
            transition: all 1.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .blurReveal.is-visible {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0);
        }

        .slideUp {
            transform: translateY(40px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slideUp.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .delay-100 {
            transition-delay: 100ms;
        }

        .delay-200 {
            transition-delay: 200ms;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="antialiased selection:bg-emerald-500 selection:text-white">

    <nav class="fixed w-full z-50 glass-panel border-b-0 border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-28 flex items-center justify-between">
            <div class="text-xl font-bold tracking-widest uppercase">Mani's<br><span
                    class="text-xs text-gray-500">Universal Landscaping</span></div>
            <a href="tel:6783863110"
                class="px-8 py-4 bg-white text-black text-xs uppercase tracking-[0.2em] font-bold hover:bg-emerald-400 hover:text-white transition-colors">
                (678) 386-3110
            </a>
        </div>
    </nav>

    <section class="relative min-h-[90vh] flex flex-col justify-end pb-24 px-6 overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1592424001807-6b0805c8afcb?q=80&w=2070&auto=format&fit=crop"
                alt="High End Lawn"
                class="object-cover w-full h-full opacity-50 mix-blend-screen scale-105 transform origin-center transition-transform duration-[20s] ease-out hover:scale-100">
            <div class="absolute inset-0 bg-gradient-to-t from-[#030303] via-[#030303]/40 to-transparent"></div>
        </div>

        <div class="relative z-10 max-w-7xl mx-auto w-full pt-48 text-center flex flex-col items-center">
            <p class="text-emerald-500 font-mono text-xs tracking-[0.3em] uppercase mb-8 observer-target blurReveal">
                Douglasville Elite</p>
            <h1
                class="text-white text-6xl md:text-[8rem] font-black tracking-tighter leading-[0.85] mb-8 observer-target blurReveal delay-100 uppercase">
                Redefining<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-gray-500 to-gray-700">The
                    Ground.</span>
            </h1>

            <div class="mt-16 observer-target slideUp delay-200">
                <a href="#contact"
                    class="inline-block px-12 py-5 bg-white text-black text-xs uppercase tracking-[0.2em] font-bold hover:bg-gray-200 transition-colors">
                    SECURE SERVICE
                </a>
            </div>
        </div>
    </section>

    <!-- Specs Grid -->
    <section class="py-32 px-6">
        <div class="max-w-7xl mx-auto relative z-10">
            <h2 class="text-4xl md:text-6xl font-bold tracking-tighter mb-20 observer-target blurReveal">
                OPERATIONAL<br>CAPABILITIES</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass-panel p-10 h-[400px] flex flex-col justify-between group observer-target slideUp">
                    <div class="text-emerald-500 font-mono text-xs tracking-widest">01 // TERRAIN MODIFICATION</div>
                    <div>
                        <h3 class="text-4xl font-black tracking-tight mb-4">Landscape<br>Installation</h3>
                    </div>
                </div>

                <div
                    class="glass-panel p-10 h-[400px] flex flex-col justify-between group observer-target slideUp delay-100">
                    <div class="text-emerald-500 font-mono text-xs tracking-widest">02 // ONGOING MAINTENANCE</div>
                    <div>
                        <h3 class="text-4xl font-black tracking-tight mb-4">Precision<br>Lawn Care</h3>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-32 px-6 bg-[#0a0a0a]">
        <div class="max-w-xl mx-auto text-center observer-target blurReveal">
            <h2 class="text-4xl md:text-6xl font-black tracking-tighter mb-8 leading-none">INITIATE.</h2>
            <form action="https://formsubmit.co/mmmoorer@yahoo.com" method="POST" class="space-y-6 text-left">
                <input type="hidden" name="_subject" value="New Design Lead From Mani's Demo Site">
                <div>
                    <input type="text" name="name" placeholder="NAME" required
                        class="w-full bg-transparent border-b border-white/20 pb-4 text-white focus:outline-none focus:border-emerald-500 transition-colors uppercase font-mono text-xs tracking-widest">
                </div>
                <div>
                    <input type="email" name="email" placeholder="EMAIL" required
                        class="w-full bg-transparent border-b border-white/20 pb-4 text-white focus:outline-none focus:border-emerald-500 transition-colors uppercase font-mono text-xs tracking-widest">
                </div>
                <button type="submit"
                    class="w-full py-5 border border-white text-white font-black uppercase tracking-[0.2em] text-xs hover:bg-white hover:text-black transition-all">
                    SUBMIT COORDINATES
                </button>
            </form>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
            document.querySelectorAll('.observer-target').forEach(el => observer.observe(el));
        });
    </script>
</body>

</html>
